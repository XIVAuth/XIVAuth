name: "Branch Push"

on:
  push:
    branches: [ "main" ]

jobs:
  rails:
    uses: ./.github/workflows/components/rails.yml
    secrets: inherit
    permissions:
      contents: read
      checks: write
      pull-requests: write

  brakeman:
    uses: ./.github/workflows/components/brakeman.yml
    permissions:
      contents: read
      security-events: write

  codeql:
    uses: ./.github/workflows/components/codeql.yml
    permissions:
      contents: read
      security-events: write
      packages: read
      actions: read

  deploy:
    if: ${{ !contains(github.event.head_commit.message, '#no-deploy') }}
    uses: ./.github/workflows/components/railway_deploy.yml
    needs: [rails, brakeman, codeql]
    permissions:
      contents: read
      deployments: write