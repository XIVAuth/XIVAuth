name: Brakeman Scan

on:
  workflow_call:

jobs:
  brakeman-scan:
    permissions:
      contents: read
      security-events: write

    name: Brakeman Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Ruby and gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan
        continue-on-error: true
        run: |
          bundle exec brakeman -f sarif -o tmp/testresults/brakeman.sarif.json .

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: tmp/testresults/brakeman.sarif.json
